events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    # Use Railway's internal Docker DNS resolver so that railway.internal
    # hostnames are resolved at request time rather than at startup.
    # valid=10s forces re-resolution every 10 seconds so stale IPs are
    # refreshed automatically; ipv6=off avoids AAAA lookup failures.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 8080;

        # Proxy /api/* requests to the api backend
        location /api/ {
            # Store the upstream address in a variable so Nginx resolves it
            # dynamically via the resolver above instead of at config load time.
            set $api_upstream http://api.railway.internal:4000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            # Disable buffering for streaming/SSE responses; enable for normal
            # REST traffic to improve reliability under slow clients.
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 4 32k;
            proxy_busy_buffers_size 64k;

            # Retry on connection-level errors (not on sent requests to avoid
            # duplicate POSTs).
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            proxy_intercept_errors on;
            error_page 502 503 504 /50x.html;
        }

        # Proxy all other requests to the web backend
        location / {
            # Store the upstream address in a variable so Nginx resolves it
            # dynamically via the resolver above instead of at config load time.
            set $web_upstream http://web.railway.internal:8080;
            proxy_pass $web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 4 32k;
            proxy_busy_buffers_size 64k;

            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            proxy_intercept_errors on;
            error_page 502 503 504 /50x.html;
        }

        # Error page
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
